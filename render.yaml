services:
  - type: web
    name: doorflow-production
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: doorflow-db
          property: connectionString

databases:
  - name: doorflow-db
    plan: free
